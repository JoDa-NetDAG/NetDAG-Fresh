<!-- ============================================
     NetDAG Contact Form - Footer Section
     Repository: JoDa-NetDAG/NetDAG-Fresh
     ============================================ -->

<section id="contact" class="contact-section">
    <div class="contact-container">
        <!-- Header -->
        <div class="contact-header">
            <h2 class="contact-title">Get in Touch</h2>
            <p class="contact-subtitle">Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
        </div>

        <!-- Contact Form -->
        <form id="contact-form" class="contact-form">
            <!-- Name Field -->
            <div class="form-group">
                <label for="contact-name" class="form-label">
                    Name <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="contact-name" 
                    name="name" 
                    class="form-input" 
                    placeholder="Your full name"
                    required
                    minlength="2"
                    maxlength="100"
                >
                <span class="form-error" id="name-error"></span>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="contact-email" class="form-label">
                    Email <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="contact-email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.email@example.com"
                    required
                >
                <span class="form-error" id="email-error"></span>
            </div>

            <!-- Subject Field -->
            <div class="form-group">
                <label for="contact-subject" class="form-label">
                    Subject <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="contact-subject" 
                    name="subject" 
                    class="form-input" 
                    placeholder="What is this regarding?"
                    required
                    minlength="3"
                    maxlength="200"
                >
                <span class="form-error" id="subject-error"></span>
            </div>

            <!-- Message Field -->
            <div class="form-group">
                <label for="contact-message" class="form-label">
                    Message <span class="required">*</span>
                </label>
                <textarea 
                    id="contact-message" 
                    name="message" 
                    class="form-textarea" 
                    placeholder="Your message here..."
                    required
                    minlength="10"
                    maxlength="5000"
                    rows="6"
                ></textarea>
                <span class="form-error" id="message-error"></span>
            </div>

            <!-- Submit Button -->
            <div class="form-actions">
                <button type="submit" class="contact-submit-btn" id="contact-submit">
                    <span class="btn-text">Send Message</span>
                    <span class="btn-loader" style="display: none;">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Status Messages -->
            <div class="form-status" id="form-status" style="display: none;">
                <div class="status-content">
                    <span class="status-icon"></span>
                    <span class="status-message"></span>
                </div>
            </div>
        </form>

        <!-- Contact Info -->
        <div class="contact-info">
            <div class="info-item">
                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <a href="mailto:info@netdag.com" class="info-link">info@netdag.com</a>
            </div>
        </div>
    </div>
</section>

<!-- Include Contact Form Scripts -->
<link rel="stylesheet" href="css/contact-form.css">
<script src="js/contact-form.js"></script>
