<!-- =========================
     NDG BUY MODAL (GLOBAL)
========================= -->
<div id="ndgBuyModal" class="ndg-modal" aria-hidden="true">

  <!-- Backdrop -->
  <div class="ndg-modal-backdrop" data-ndg-close></div>

  <!-- Card -->
  <div
    class="ndg-modal-card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="ndgBuyModalTitle"
  >
    <button
      class="ndg-modal-close"
      type="button"
      aria-label="Close"
      data-ndg-close
    >
      ×
    </button>

    <h2 class="ndg-modal-title" id="ndgBuyModalTitle">
      NDG Token Presale
    </h2>

    <p class="ndg-modal-sub">
      Preview your NDG estimate.
      Buying is currently disabled.
    </p>

    <form id="ndgBuyForm" autocomplete="off">

      <!-- USD INPUT -->
   <input id="ndgUsdInput" type="number" min="1" step="1" placeholder="Enter USD amount" />
   <input id="ndgNdgInput" type="number" min="1" step="1" placeholder="Enter NDG amount" />

      <!-- OUTPUTS -->
      <div class="ndg-summary">
        <span>NDG tokens: <b id="ndgTokensOut">—</b></span>
        <span>Cost: <b id="ndgCostOut">—</b> USD</span>
      </div>

      <!-- EARLYBIRD -->
      <div class="ndg-earlybird">
        <div>30 days: <b id="ndgBonus30">—</b> NDG</div>
        <div>60 days: <b id="ndgBonus60">—</b> NDG</div>
        <div>90 days: <b id="ndgBonus90">—</b> NDG</div>
        <div class="ndg-footnote">
        <span>Earlybird bonus: +8% per 30 days (airdropped separately).</span>    
        </div>
      </div>

      <!-- CTA -->
      <button class="ndg-buy-btn" type="button" disabled>
        Buy NDG (disabled)
      </button>

      <div class="ndg-status" id="ndgBuyStatus">
        Estimates only · Buying disabled
      </div>

    </form>
  </div>
</div>
